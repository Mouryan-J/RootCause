<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 500" width="860" height="500">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6b7280"/>
    </marker>
    <marker id="arr-blue" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#4f46e5"/>
    </marker>
    <marker id="arr-indigo" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#3b82f6"/>
    </marker>
    <marker id="arr-violet" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#7c3aed"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ea580c"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="860" height="500" fill="#0f172a"/>

  <!-- ── BROWSER ── -->
  <rect x="330" y="15" width="200" height="55" rx="8" fill="#172554" stroke="#3b82f6" stroke-width="2"/>
  <text x="430" y="40" text-anchor="middle" fill="#bfdbfe" font-size="13" font-weight="bold" font-family="system-ui,sans-serif">Browser</text>
  <text x="430" y="57" text-anchor="middle" fill="#93c5fd" font-size="10" font-family="system-ui,sans-serif">Next.js · Vercel</text>

  <!-- Browser ↔ FastAPI arrows -->
  <line x1="418" y1="70" x2="418" y2="100" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="442" y1="100" x2="442" y2="70" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="452" y="88" fill="#4b5563" font-size="9" font-family="system-ui,sans-serif">POST / GET</text>

  <!-- ── FASTAPI CONTAINER ── -->
  <rect x="20" y="105" width="820" height="270" rx="10" fill="#0f0e2a" stroke="#4f46e5" stroke-width="2"/>
  <text x="40" y="127" fill="#a5b4fc" font-size="12" font-weight="bold" font-family="system-ui,sans-serif">FastAPI Backend · Render</text>

  <!-- LangGraph subcontainer -->
  <rect x="35" y="135" width="790" height="220" rx="8" fill="#080818" stroke="#312e81" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="55" y="155" fill="#6366f1" font-size="10" font-family="system-ui,sans-serif">LangGraph Multi-Agent Pipeline (star topology · coordinator routes workers)</text>

  <!-- Triage -->
  <rect x="50" y="165" width="160" height="58" rx="6" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="130" y="189" text-anchor="middle" fill="#e0e7ff" font-size="12" font-weight="bold" font-family="system-ui,sans-serif">Triage</text>
  <text x="130" y="206" text-anchor="middle" fill="#a5b4fc" font-size="9" font-family="system-ui,sans-serif">gpt-4o-mini</text>
  <text x="130" y="218" text-anchor="middle" fill="#818cf8" font-size="8" font-family="system-ui,sans-serif">classify · extract signals</text>

  <!-- Arrow Triage → Retrieval -->
  <line x1="210" y1="194" x2="237" y2="194" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Retrieval -->
  <rect x="240" y="165" width="185" height="58" rx="6" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="332" y="189" text-anchor="middle" fill="#e0e7ff" font-size="12" font-weight="bold" font-family="system-ui,sans-serif">Retrieval</text>
  <text x="332" y="206" text-anchor="middle" fill="#a5b4fc" font-size="9" font-family="system-ui,sans-serif">BM25 + Qdrant + RRF</text>
  <text x="332" y="218" text-anchor="middle" fill="#818cf8" font-size="8" font-family="system-ui,sans-serif">Cohere rerank · Neo4j graph</text>

  <!-- Arrow Retrieval → RCA -->
  <line x1="425" y1="194" x2="452" y2="194" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- RCA -->
  <rect x="455" y="165" width="145" height="58" rx="6" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="527" y="189" text-anchor="middle" fill="#e0e7ff" font-size="12" font-weight="bold" font-family="system-ui,sans-serif">RCA</text>
  <text x="527" y="206" text-anchor="middle" fill="#a5b4fc" font-size="9" font-family="system-ui,sans-serif">claude-haiku</text>
  <text x="527" y="218" text-anchor="middle" fill="#818cf8" font-size="8" font-family="system-ui,sans-serif">ranked hypotheses · evidence</text>

  <!-- Arrow RCA → Remediation -->
  <line x1="600" y1="194" x2="627" y2="194" stroke="#4f46e5" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- Remediation -->
  <rect x="630" y="165" width="175" height="58" rx="6" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="717" y="189" text-anchor="middle" fill="#e0e7ff" font-size="12" font-weight="bold" font-family="system-ui,sans-serif">Remediation</text>
  <text x="717" y="206" text-anchor="middle" fill="#a5b4fc" font-size="9" font-family="system-ui,sans-serif">gpt-4o-mini</text>
  <text x="717" y="218" text-anchor="middle" fill="#818cf8" font-size="8" font-family="system-ui,sans-serif">fix steps · runbook refs</text>

  <!-- Retrieval dotted lines to Qdrant and Neo4j -->
  <line x1="305" y1="223" x2="430" y2="375" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr-indigo)"/>
  <line x1="360" y1="223" x2="595" y2="375" stroke="#7c3aed" stroke-width="1" stroke-dasharray="4,2" marker-end="url(#arr-violet)"/>

  <!-- FastAPI → PostgreSQL / Redis (solid) -->
  <line x1="107" y1="375" x2="107" y2="415" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <line x1="220" y1="375" x2="260" y2="415" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
  <!-- FastAPI → Langfuse (dashed orange) -->
  <line x1="752" y1="375" x2="752" y2="415" stroke="#ea580c" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#arr-orange)"/>

  <!-- ── DATABASE ROW ── -->

  <!-- PostgreSQL -->
  <rect x="20" y="415" width="175" height="65" rx="8" fill="#052e16" stroke="#16a34a" stroke-width="1.5"/>
  <text x="107" y="441" text-anchor="middle" fill="#bbf7d0" font-size="12" font-weight="bold" font-family="system-ui,sans-serif">PostgreSQL</text>
  <text x="107" y="458" text-anchor="middle" fill="#86efac" font-size="9" font-family="system-ui,sans-serif">Incident records</text>
  <text x="107" y="472" text-anchor="middle" fill="#4ade80" font-size="8" font-family="system-ui,sans-serif">SQLAlchemy async</text>

  <!-- Redis -->
  <rect x="205" y="415" width="140" height="65" rx="8" fill="#450a0a" stroke="#dc2626" stroke-width="1.5"/>
  <text x="275" y="441" text-anchor="middle" fill="#fecaca" font-size="12" font-weight="bold" font-family="system-ui,sans-serif">Redis</text>
  <text x="275" y="458" text-anchor="middle" fill="#fca5a5" font-size="9" font-family="system-ui,sans-serif">Result cache</text>
  <text x="275" y="472" text-anchor="middle" fill="#f87171" font-size="8" font-family="system-ui,sans-serif">30 min TTL</text>

  <!-- Qdrant -->
  <rect x="355" y="415" width="155" height="65" rx="8" fill="#172554" stroke="#2563eb" stroke-width="1.5"/>
  <text x="432" y="441" text-anchor="middle" fill="#bfdbfe" font-size="12" font-weight="bold" font-family="system-ui,sans-serif">Qdrant Cloud</text>
  <text x="432" y="458" text-anchor="middle" fill="#93c5fd" font-size="9" font-family="system-ui,sans-serif">Runbook vectors</text>
  <text x="432" y="472" text-anchor="middle" fill="#60a5fa" font-size="8" font-family="system-ui,sans-serif">Cohere embed-english-v3</text>

  <!-- Neo4j -->
  <rect x="520" y="415" width="145" height="65" rx="8" fill="#2e1065" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="592" y="441" text-anchor="middle" fill="#e9d5ff" font-size="12" font-weight="bold" font-family="system-ui,sans-serif">Neo4j Aura</text>
  <text x="592" y="458" text-anchor="middle" fill="#c4b5fd" font-size="9" font-family="system-ui,sans-serif">Service graph</text>
  <text x="592" y="472" text-anchor="middle" fill="#a78bfa" font-size="8" font-family="system-ui,sans-serif">upstream · downstream deps</text>

  <!-- Langfuse -->
  <rect x="675" y="415" width="165" height="65" rx="8" fill="#431407" stroke="#ea580c" stroke-width="1.5"/>
  <text x="757" y="441" text-anchor="middle" fill="#fed7aa" font-size="12" font-weight="bold" font-family="system-ui,sans-serif">Langfuse</text>
  <text x="757" y="458" text-anchor="middle" fill="#fdba74" font-size="9" font-family="system-ui,sans-serif">LLM tracing</text>
  <text x="757" y="472" text-anchor="middle" fill="#fb923c" font-size="8" font-family="system-ui,sans-serif">token counts · cost/incident</text>

</svg>
