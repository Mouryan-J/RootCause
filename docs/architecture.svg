<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 555" width="900" height="555">
  <defs>
    <marker id="arr-gray" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6b7280"/>
    </marker>
    <marker id="arr-indigo" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#6366f1"/>
    </marker>
    <marker id="arr-orange" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#ea580c"/>
    </marker>
    <marker id="arr-green" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6 Z" fill="#16a34a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="555" fill="#0f172a"/>

  <!-- ═══════════════════════════════════════════════
       BROWSER
  ════════════════════════════════════════════════ -->
  <rect x="90" y="15" width="200" height="55" rx="8" fill="#172554" stroke="#3b82f6" stroke-width="2"/>
  <text x="190" y="39" text-anchor="middle" fill="#bfdbfe" font-size="13" font-weight="bold" font-family="system-ui,sans-serif">Browser</text>
  <text x="190" y="57" text-anchor="middle" fill="#93c5fd" font-size="10" font-family="system-ui,sans-serif">Next.js · Vercel</text>

  <!-- Browser ↓ FastAPI -->
  <line x1="190" y1="70" x2="190" y2="118" stroke="#6b7280" stroke-width="2" marker-end="url(#arr-gray)"/>
  <text x="197" y="98" fill="#4b5563" font-size="9" font-family="system-ui,sans-serif">submit incident</text>

  <!-- ═══════════════════════════════════════════════
       FASTAPI CONTAINER
  ════════════════════════════════════════════════ -->
  <rect x="15" y="102" width="340" height="435" rx="10" fill="#080818" stroke="#4f46e5" stroke-width="2"/>
  <text x="35" y="122" fill="#818cf8" font-size="10" font-weight="bold" font-family="system-ui,sans-serif">FastAPI Backend · Render</text>

  <!-- ① TRIAGE -->
  <rect x="32" y="128" width="305" height="78" rx="7" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="50" y="148" fill="#6366f1" font-size="10" font-weight="bold" font-family="system-ui,sans-serif">① Triage</text>
  <text x="185" y="165" text-anchor="middle" fill="#e0e7ff" font-size="13" font-weight="bold" font-family="system-ui,sans-serif">Triage Agent</text>
  <text x="185" y="182" text-anchor="middle" fill="#a5b4fc" font-size="10" font-family="system-ui,sans-serif">gpt-4o-mini</text>
  <text x="185" y="197" text-anchor="middle" fill="#818cf8" font-size="8.5" font-family="system-ui,sans-serif">classify severity · extract key signals · build search query</text>

  <!-- ① → ② -->
  <line x1="185" y1="206" x2="185" y2="238" stroke="#6b7280" stroke-width="2" marker-end="url(#arr-gray)"/>

  <!-- ② RETRIEVAL -->
  <rect x="32" y="240" width="305" height="78" rx="7" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="50" y="260" fill="#6366f1" font-size="10" font-weight="bold" font-family="system-ui,sans-serif">② Retrieval</text>
  <text x="185" y="277" text-anchor="middle" fill="#e0e7ff" font-size="13" font-weight="bold" font-family="system-ui,sans-serif">Retrieval Agent</text>
  <text x="185" y="294" text-anchor="middle" fill="#a5b4fc" font-size="10" font-family="system-ui,sans-serif">BM25 + Qdrant vectors · RRF fusion · Cohere rerank</text>
  <text x="185" y="308" text-anchor="middle" fill="#818cf8" font-size="8.5" font-family="system-ui,sans-serif">queries Qdrant Cloud + Neo4j service graph</text>

  <!-- ② → ③ -->
  <line x1="185" y1="318" x2="185" y2="350" stroke="#6b7280" stroke-width="2" marker-end="url(#arr-gray)"/>

  <!-- ③ RCA -->
  <rect x="32" y="352" width="305" height="78" rx="7" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="50" y="372" fill="#6366f1" font-size="10" font-weight="bold" font-family="system-ui,sans-serif">③ RCA</text>
  <text x="185" y="389" text-anchor="middle" fill="#e0e7ff" font-size="13" font-weight="bold" font-family="system-ui,sans-serif">RCA Agent</text>
  <text x="185" y="406" text-anchor="middle" fill="#a5b4fc" font-size="10" font-family="system-ui,sans-serif">claude-haiku-4-5</text>
  <text x="185" y="421" text-anchor="middle" fill="#818cf8" font-size="8.5" font-family="system-ui,sans-serif">ranked root causes · confidence scores · evidence citations</text>

  <!-- ③ → ④ -->
  <line x1="185" y1="430" x2="185" y2="462" stroke="#6b7280" stroke-width="2" marker-end="url(#arr-gray)"/>

  <!-- ④ REMEDIATION -->
  <rect x="32" y="464" width="305" height="60" rx="7" fill="#1e1b4b" stroke="#6366f1" stroke-width="1.5"/>
  <text x="50" y="482" fill="#6366f1" font-size="10" font-weight="bold" font-family="system-ui,sans-serif">④ Remediation</text>
  <text x="185" y="491" text-anchor="middle" fill="#e0e7ff" font-size="13" font-weight="bold" font-family="system-ui,sans-serif">Remediation Agent</text>
  <text x="185" y="508" text-anchor="middle" fill="#818cf8" font-size="8.5" font-family="system-ui,sans-serif">gpt-4o-mini · fix steps · runbook references</text>

  <!-- ═══════════════════════════════════════════════
       HORIZONTAL CONNECTOR ARROWS
  ════════════════════════════════════════════════ -->

  <!-- Retrieval → Retrieval Sources -->
  <line x1="337" y1="279" x2="385" y2="279" stroke="#6366f1" stroke-width="2" marker-end="url(#arr-indigo)"/>

  <!-- RCA → Langfuse -->
  <line x1="337" y1="391" x2="385" y2="391" stroke="#ea580c" stroke-width="2" marker-end="url(#arr-orange)"/>

  <!-- Remediation → Storage -->
  <line x1="337" y1="494" x2="385" y2="494" stroke="#16a34a" stroke-width="2" marker-end="url(#arr-green)"/>

  <!-- ═══════════════════════════════════════════════
       RETRIEVAL SOURCES GROUP
  ════════════════════════════════════════════════ -->
  <rect x="387" y="226" width="495" height="108" rx="8" fill="#07071e" stroke="#4338ca" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="404" y="242" fill="#6366f1" font-size="9" font-weight="bold" font-family="system-ui,sans-serif">RETRIEVAL SOURCES</text>

  <!-- Qdrant Cloud -->
  <rect x="402" y="246" width="220" height="75" rx="6" fill="#172554" stroke="#2563eb" stroke-width="1.5"/>
  <text x="512" y="268" text-anchor="middle" fill="#bfdbfe" font-size="12" font-weight="bold" font-family="system-ui,sans-serif">Qdrant Cloud</text>
  <text x="512" y="285" text-anchor="middle" fill="#93c5fd" font-size="9.5" font-family="system-ui,sans-serif">Dense vector search</text>
  <text x="512" y="300" text-anchor="middle" fill="#60a5fa" font-size="8" font-family="system-ui,sans-serif">Cohere embed-english-v3.0 · 1536-dim</text>
  <text x="512" y="313" text-anchor="middle" fill="#60a5fa" font-size="8" font-family="system-ui,sans-serif">252 runbooks + postmortems indexed</text>

  <!-- Neo4j Aura -->
  <rect x="638" y="246" width="230" height="75" rx="6" fill="#2e1065" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="753" y="268" text-anchor="middle" fill="#e9d5ff" font-size="12" font-weight="bold" font-family="system-ui,sans-serif">Neo4j Aura</text>
  <text x="753" y="285" text-anchor="middle" fill="#c4b5fd" font-size="9.5" font-family="system-ui,sans-serif">Service dependency graph</text>
  <text x="753" y="300" text-anchor="middle" fill="#a78bfa" font-size="8" font-family="system-ui,sans-serif">upstream · downstream services</text>
  <text x="753" y="313" text-anchor="middle" fill="#a78bfa" font-size="8" font-family="system-ui,sans-serif">11 services · 21 edges</text>

  <!-- ═══════════════════════════════════════════════
       LANGFUSE
  ════════════════════════════════════════════════ -->
  <rect x="387" y="360" width="495" height="65" rx="8" fill="#3b0d00" stroke="#ea580c" stroke-width="1.5"/>
  <text x="635" y="382" text-anchor="middle" fill="#fed7aa" font-size="13" font-weight="bold" font-family="system-ui,sans-serif">Langfuse</text>
  <text x="635" y="399" text-anchor="middle" fill="#fdba74" font-size="10" font-family="system-ui,sans-serif">LLM Observability · token counts · latency per agent step</text>
  <text x="635" y="414" text-anchor="middle" fill="#fb923c" font-size="8.5" font-family="system-ui,sans-serif">traces every RCA + Remediation call · cost per incident</text>

  <!-- ═══════════════════════════════════════════════
       STORAGE GROUP
  ════════════════════════════════════════════════ -->
  <rect x="387" y="455" width="495" height="77" rx="8" fill="#020d05" stroke="#166534" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="404" y="470" fill="#15803d" font-size="9" font-weight="bold" font-family="system-ui,sans-serif">STORAGE</text>

  <!-- PostgreSQL -->
  <rect x="402" y="474" width="220" height="48" rx="6" fill="#052e16" stroke="#16a34a" stroke-width="1.5"/>
  <text x="512" y="494" text-anchor="middle" fill="#bbf7d0" font-size="12" font-weight="bold" font-family="system-ui,sans-serif">PostgreSQL</text>
  <text x="512" y="511" text-anchor="middle" fill="#86efac" font-size="9" font-family="system-ui,sans-serif">Incident records · SQLAlchemy async</text>

  <!-- Redis -->
  <rect x="638" y="474" width="230" height="48" rx="6" fill="#450a0a" stroke="#dc2626" stroke-width="1.5"/>
  <text x="753" y="494" text-anchor="middle" fill="#fecaca" font-size="12" font-weight="bold" font-family="system-ui,sans-serif">Redis</text>
  <text x="753" y="511" text-anchor="middle" fill="#fca5a5" font-size="9" font-family="system-ui,sans-serif">30 min result cache · TTL eviction</text>

</svg>
